[colors]
; https://github.com/morhetz/gruvbox
;
background = #282828
background-alt = #504945
foreground = #ebdbb2
foreground-alt = #bdae93
alert = #cc241d
green = #98971a
yellow = #d79921
blue = #458588
purple = #b16286
aqua = #689d6a
gray = #a89984
red = #fb4934

[bar/main]
width = 100%
height = 24pt
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 2pt
border-color = ${colors.background-alt} 

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.background-alt}

font-0 = "Hack Nerd Font:size=12;2"
font-1 = "Hack Nerd Font:size=12;2"

modules-left = xworkspaces
modules-center = xwindow
modules-right = usd-price eur-price btc-price downspeed alsa xkeyboard date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.yellow}
label-active-padding = 1

label-occupied = %name%
label-occupied-foreground = ${colors.blue}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /
mount-1 = /media/crutial

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "󰕾 "
format-volume-prefix-foreground = ${colors.green}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/alsa]
type = internal/alsa

format-volume-prefix = "󰕾 "
format-volume-prefix-foreground = ${colors.green}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = "󰖁 muted"
label-muted-foreground = ${colors.gray}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

format-prefix = "󰥻 "
format-prefix-foreground = ${colors.green}
format = <label-layout>

label-layout = %layout%

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.green}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.green}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
; interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface = enp3s0 
; interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/downspeed]
type = internal/network
interval = 2
interface = enp3s0 
label-connected = "%downspeed%"
format-connected = <label-connected>
format-connected-prefix = "󰇚 "
format-connected-foreground = ${colors.yellow}

[module/usd-price]
type = custom/script
exec = ~/.config/polybar/usd_price_cbr.sh
interval = 3600
label = "%output%"
format = <label>
format-prefix = " "
format-foreground = ${colors.aqua}

[module/eur-price]
type = custom/script
exec = ~/.config/polybar/eur_price_cbr.sh
interval = 3600
label = "%output%"
format = <label>
format-prefix = " "
format-foreground = ${colors.aqua}

[module/btc-price]
type = custom/script
exec = ~/.config/polybar/btc_price_bnnc.sh
interval = 3600
label = "%output%"
format = <label>
format-prefix = " "
format-foreground = ${colors.aqua}

[module/myip]
type = custom/script
exec = ~/.config/polybar/myip.sh
tail = true
interval = 3600
; click-left = ~/.config/polybar/myip.sh

[module/date]
type = internal/date
interval = 1

date = %H:%M:%S
date-alt = %H:%M:%S %d/%m/%Y 

label = %date%
format-prefix = " "
format-prefix-foreground = ${colors.green}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
